services:
  vps-monitor:
    build: .
    container_name: vps-monitor
    restart: unless-stopped
    network_mode: host         # acessa /proc do host diretamente para métricas reais
    volumes:
      - /proc:/proc:ro         # métricas do host (CPU, memória, rede, uptime)
    environment:
      PORT: 9090
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"
